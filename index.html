<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teslim Tarihi Takip — Çimtaş Machining</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F6F8;color:#1B2E5E;font-size:14px}
:root{
  --navy:#1B2E5E;--navy2:#243b78;--orange:#E8732A;--orange2:#d4631c;
  --green:#16a34a;--red:#dc2626;--gray:#64748B;--lgray:#94A3B8;
  --border:#E2E8F0;--bg:#F5F6F8;--white:#ffffff;
  --amber:#f59e0b;
}

/* Layout */
.page{min-height:100vh}
header{background:var(--navy);padding:10px 24px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
header .inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo-img{height:32px;width:auto}
main{max-width:1300px;margin:0 auto;padding:24px 16px}

/* Nav */
.nav-links{display:flex;align-items:center;gap:4px}
.nav-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.7);transition:all 0.15s}
.nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,0.15);color:white}
.nav-btn.orange{background:var(--orange);color:white}
.nav-btn.orange:hover{background:var(--orange2)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:all 0.15s;white-space:nowrap}
.btn-primary{background:var(--orange);color:white}.btn-primary:hover{background:var(--orange2)}
.btn-navy{background:var(--navy);color:white}.btn-navy:hover{background:var(--navy2)}
.btn-ghost{background:transparent;color:var(--gray);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--navy);color:var(--navy)}
.btn-red{background:#fee2e2;color:#dc2626}.btn-red:hover{background:#fecaca}
.btn-green{background:#dcfce7;color:#16a34a}.btn-green:hover{background:#bbf7d0}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn:disabled{opacity:0.4;cursor:not-allowed}

/* Cards */
.card{background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-pad{padding:20px}

/* Forms */
input[type=text],input[type=date],input[type=password],textarea,select{
  width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;font-family:inherit;background:white;color:var(--navy);outline:none;
  transition:border-color 0.15s,box-shadow 0.15s
}
input:focus,textarea:focus,select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,115,42,0.12)}
input:disabled{background:#F8FAFC;color:var(--gray)}
label.lbl{font-size:11px;color:var(--gray);font-weight:600;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--orange);cursor:pointer;flex-shrink:0}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
.b-orange{background:#fff0e8;color:#c25a1a}
.b-green{background:#dcfce7;color:#166534}
.b-red{background:#fee2e2;color:#991b1b}
.b-blue{background:#dbeafe;color:#1e40af}
.b-gray{background:#f1f5f9;color:var(--gray)}
.b-acil{background:#dc2626;color:white;letter-spacing:0.5px}
.b-navy{background:#e8edf7;color:var(--navy)}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:9px 12px;background:#F1F5F9;color:var(--gray);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap}
.tbl th input[type=checkbox]{margin:0}
.tbl td{padding:8px 12px;border-top:1px solid var(--border);color:var(--navy);vertical-align:middle}
.tbl tr:hover td{background:#fafbfc}
.tbl tr.late td{background:#fff5f5}
.tbl tr.selected td{background:#fff8f4}
.mono{font-family:'SF Mono',Consolas,monospace;font-size:11px}

/* Progress */
.prog{height:5px;background:#E8EDF7;border-radius:99px;overflow:hidden;min-width:80px}
.prog-bar{height:100%;border-radius:99px;transition:width 0.3s}

/* Tabs */
.page-tabs{display:flex;gap:2px;background:white;border-bottom:2px solid var(--border);padding:0 24px;overflow-x:auto;margin-bottom:0}
.page-tab{padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--gray);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all 0.15s}
.page-tab:hover{color:var(--navy)}
.page-tab.active{color:var(--orange);border-bottom-color:var(--orange)}

/* Alert */
.alert{padding:10px 16px;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.alert-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.alert-err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.alert-warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.alert-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}

/* Upload zone */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:border-color 0.2s}
.upload-zone:hover{border-color:var(--orange);background:#fffaf8}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:white;border-radius:16px;max-width:580px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal-hdr{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:15px;font-weight:700;color:var(--navy)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-ftr{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.mail-preview{background:#F5F6F8;border:1px solid var(--border);border-radius:8px;padding:14px;font-size:12px;line-height:1.8;white-space:pre-wrap;font-family:inherit;color:#334155;max-height:300px;overflow-y:auto}
.mail-lbl{font-size:10px;font-weight:700;color:var(--lgray);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:3px;margin-top:12px}
.mail-lbl:first-child{margin-top:0}

/* Stat */
.stat{background:white;border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-val{font-size:28px;font-weight:800;line-height:1}
.stat-lbl{font-size:11px;color:var(--lgray);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}

/* Misc */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:700px){.grid2,.grid3,.grid4,.grid5{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.grid2,.grid3,.grid4,.grid5{grid-template-columns:1fr}}
.flex{display:flex;align-items:center}.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.flex-1{flex:1}.min-w-0{min-width:0}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}
.space-y>*+*{margin-top:10px}
.hidden{display:none!important}
.text-xs{font-size:11px}.text-sm{font-size:13px}.text-lg{font-size:17px}
.fw6{font-weight:600}.fw7{font-weight:700}.fw8{font-weight:800}
.c-gray{color:var(--gray)}.c-lgray{color:var(--lgray)}.c-red{color:#dc2626}.c-green{color:#16a34a}.c-orange{color:var(--orange)}.c-navy{color:var(--navy)}
.search-wrap{position:relative}
.search-wrap input{padding-left:34px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--lgray);pointer-events:none}
.overflow-x{overflow-x:auto}
.rounded{border-radius:8px}
.border{border:1px solid var(--border)}
.divider{border:none;border-top:1px solid var(--border);margin:0}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-title{font-size:16px;font-weight:800;color:var(--navy)}
.action-panel{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:18px;margin-bottom:20px}

/* Supplier form */
.order-card{background:white;border:1px solid var(--border);border-radius:10px;padding:14px;transition:border-color 0.15s}
.order-card.acil{border-color:#fca5a5;background:#fff5f5}
.order-card.done{border-color:#86efac;background:#f0fdf4}

/* Landing */
.dark-page{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:24px}
</style>
</head>

async function supa(path, opts) {
  const res = await fetch(SUPA_URL + "/rest/v1/" + path, Object.assign({ headers: Object.assign({}, HDR, { "Prefer": "return=minimal" }) }, opts));
  if (!res.ok) throw new Error(await res.text());

async function supaGet(path) {
  const res = await fetch(SUPA_URL + "/rest/v1/" + path, { headers: HDR });

  const t = await res.text(); return t ? JSON.parse(t) : [];

<script>
function serialToISO(v) {
  if (!v && v !== 0) return "";
  if (typeof v === "number" && v > 1) {
    const serial = v > 59 ? v : v + 1;
    const d = new Date(new Date(Date.UTC(1899,11,30)).getTime() + serial * 86400000);
    return d.getUTCFullYear() + "-" + String(d.getUTCMonth()+1).padStart(2,"0") + "-" + String(d.getUTCDate()).padStart(2,"0");
  }
  if (typeof v === "string") {
    if (/^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0,10);
    if (/^\d{2}\.\d{2}\.\d{4}/.test(v)) { const p=v.split("."); return p[2]+"-"+p[1]+"-"+p[0]; }
  }
  return "";
}
function fmtDate(iso) {
  if (!iso) return "—";
  const p = iso.split("-");
  if (p.length !== 3) return iso;
  return p[2]+"."+p[1]+"."+p[0];
}
function daysUntil(iso) {
  if (!iso) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.floor((new Date(iso+"T00:00:00") - today) / 86400000);
}
function daysDiff(iso) {
  if (!iso) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.floor((today - new Date(iso+"T00:00:00")) / 86400000);
}
function normalizeEmails(raw) {
  if (!raw) return [];
  return String(raw).split(/[;,]/).map(e=>e.trim()).filter(e=>e.includes("@"));
}
function buildLink(tedNo) {
  return window.location.href.split("?")[0] + "?supplier=" + encodeURIComponent(String(tedNo));
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function getParam(name) { return new URLSearchParams(window.location.search).get(name); }
function navigate(q) { window.location.href = window.location.pathname + (q ? "?"+q : ""); }

function flash(msg, type) {
  const el = document.getElementById("flash");
  if (!el) return;
  el.textContent = msg;
  el.className = "alert " + (type==="err" ? "alert-err" : type==="warn" ? "alert-warn" : type==="info" ? "alert-info" : "alert-ok");
  el.classList.remove("hidden");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.add("hidden"), 4000);
}

function openMailto(mailto) {
  const a = document.createElement("a");
  a.href = mailto; a.style.display = "none";
  document.body.appendChild(a); a.click();
  setTimeout(() => document.body.removeChild(a), 500);
}

function showMailModal(opts) {
  const existing = document.getElementById("mail-modal");
  if (existing) existing.remove();
  const modal = document.createElement("div");
  modal.className = "modal-overlay"; modal.id = "mail-modal";
  modal.innerHTML = `
  <div class="modal">
    <div class="modal-hdr">
      <h3>📧 Mail Önizleme</h3>
      <button onclick="document.getElementById('mail-modal').remove()" style="background:none;border:none;cursor:pointer;color:#94A3B8;font-size:20px;line-height:1">×</button>
    </div>
    <div class="modal-body">
      <span class="mail-lbl">Alıcı</span>
      <div style="font-size:13px;color:var(--navy);margin-bottom:4px">${esc(opts.to)}</div>
      <span class="mail-lbl">Konu</span>
      <div style="font-size:13px;color:var(--navy);margin-bottom:4px">${esc(opts.subject)}</div>
      <span class="mail-lbl">İçerik</span>
      <div class="mail-preview">${esc(opts.body)}</div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('mail-modal').remove()">İptal</button>
      <button class="btn btn-primary btn-sm" onclick="document.getElementById('mail-modal').remove();window._mailConfirm()">✉ Outlook'ta Aç</button>
    </div>
  </div>`;
  window._mailConfirm = opts.onConfirm;
  document.body.appendChild(modal);
  modal.addEventListener("click", e => { if (e.target===modal) modal.remove(); });
}

function readExcel(file) {
  return new Promise((res,rej) => {
    const reader = new FileReader();
    reader.onload = e => res(XLSX.read(e.target.result, { type:"array", raw:true }));
    reader.onerror = () => rej(reader.error);
    reader.readAsArrayBuffer(file);
  });
}

function parseOrderExcel(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:"", raw:true });
  const result = [];
  for (let i=1; i<rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 13) continue;
    const tedNo = String(r[11]||"").trim().split(".")[0]; // 65479.0 → 65479
    const talepNo = String(r[1]||"").trim();
    const strNo = String(r[2]||"").trim();
    if (!tedNo || !talepNo) continue;
    result.push({
      id: tedNo+"-"+talepNo+"-"+strNo,
      talepTipi: String(r[0]||"").trim(), talepNo, strNo,
      malzKodu: String(r[3]||"").trim(), malzTanim: String(r[4]||"").trim(),
      origQty: String(r[5]||"").trim(), bagMiktar: String(r[6]||"").trim(),
      sozTarih: serialToISO(r[9]), tedNo,
      tedUnvan: String(r[12]||"").trim(), acil: false
    });
  }
  return result;
}

function parseSupplierExcel(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:"", raw:true });
  const map = {};
  for (let i=1; i<rows.length; i++) {
    const r = rows[i];
    if (!r || !r[0]) continue;
    const no = String(r[0]).trim().split(".")[0]; // 65479.0 → 65479
    if (!no) continue;
    map[no] = { tedNo: no, name: String(r[1]||"").trim(), mail: String(r[2]||"").trim() };
  }
  return map;
}

function exportExcel(orders, responses) {
  const headers = ["Talep Tipi","Talep No","Str No","JDE Malz. Kodu","Malzeme Tanımı","Orig. Qty","Bağlanmamış Miktar","Söz Verilen Tarih","Yeni Teslim Tarihi","Not","Tedarikçi No","Tedarikçi Ünvan","Durum"];
  const data = [headers, ...orders.map(o => {
    const r = responses[o.id] || {};
    const until = daysUntil(o.sozTarih);
    const durum = r.savedAt ? "Girildi" : until !== null && until < 0 ? "Gecikmiş" : "Bekliyor";
    return [o.talepTipi, o.talepNo, o.strNo, o.malzKodu, o.malzTanim, o.origQty, o.bagMiktar,
            fmtDate(o.sozTarih), r.yeniTarih ? fmtDate(r.yeniTarih) : "", r.not||"",
            o.tedNo, o.tedUnvan, durum];
  })];
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws["!cols"] = [8,10,8,14,30,10,14,14,14,20,10,30,10].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws, "Teslim Takip");
  XLSX.writeFile(wb, "Teslim_Takip_"+new Date().toISOString().slice(0,10)+".xlsx");
}
</script>

     SUPPLIER GATE
═══════════════════════════════════ -->
<script>
async function showSupplierGate(supplierId) {
  const pwd = await getAyar("password") || "";
  if (!pwd) { await showSupplierView(supplierId); return; }
  document.body.innerHTML = `
  <div class="dark-page">
    <div style="max-width:360px;width:100%">
      <div style="text-align:center;margin-bottom:24px">${logoHTML(36)}</div>
      <div style="background:#243b78;border-radius:16px;padding:24px;border:1px solid rgba(255,255,255,0.1)">
        <label class="lbl" style="color:rgba(255,255,255,0.6)">Erişim şifresi</label>
        <input id="pwd-in" type="password" placeholder="Şifrenizi girin"
          style="background:rgba(255,255,255,0.1);color:white;border-color:rgba(255,255,255,0.2);margin-bottom:12px"
          onkeydown="if(event.key==='Enter')checkPwd('${esc(supplierId)}')" />
        <p id="pwd-err" class="hidden" style="color:#fca5a5;font-size:12px;margin-bottom:8px">Yanlış şifre, tekrar deneyin.</p>
        <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="checkPwd('${esc(supplierId)}')">Giriş</button>
      </div>
    </div>
  </div>`;
}

async function checkPwd(supplierId) {
  const pwd = await getAyar("password") || "";
  const input = document.getElementById("pwd-in").value;
  if (input === pwd) { await showSupplierView(supplierId); }
  else {
    document.getElementById("pwd-err").classList.remove("hidden");
    document.getElementById("pwd-in").style.borderColor = "#fca5a5";
  }
}
</script>

<!-- ═══════════════════════════════════
     SUPPLIER VIEW
═══════════════════════════════════ -->
<script>
async function showSupplierView(supplierId) {
  const [allOrders, responses] = await Promise.all([getOrders(), getResponses()]);
  const orders = allOrders.filter(o => o.tedNo === supplierId);
  const tedAdi = (orders[0] && orders[0].tedUnvan) || supplierId;

  const acil = orders.filter(o => o.acil);
  const normal = orders.filter(o => !o.acil);

  function orderRowHTML(o, idx) {
    const r = responses[o.id] || {};
    const isSubmitted = !!r.savedAt;
    const until = daysUntil(o.sozTarih);
    const isLate = until !== null && until < 0 && !r.yeniTarih;
    return `
    <tr class="${isSubmitted ? "" : isLate ? "late" : ""}" id="row-${o.id}">
      <td><input type="checkbox" id="chk-sup-${o.id}" /></td>
      <td>
        <div class="flex gap4 flex-wrap">
          ${o.acil ? '<span class="badge b-acil" style="font-size:9px">ACİL</span>' : ""}
          ${isLate ? '<span class="badge b-red" style="font-size:9px">Tarih Geçmiş</span>' : ""}
          ${isSubmitted ? '<span class="badge b-green" style="font-size:9px">✓</span>' : ""}
        </div>
      </td>
      <td class="mono">${esc(o.talepTipi)} ${esc(o.talepNo)}/${esc(o.strNo)}</td>
      <td><span class="mono" style="background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:11px">${esc(o.malzKodu)}</span></td>
      <td style="max-width:220px"><div class="truncate" title="${esc(o.malzTanim)}">${esc(o.malzTanim)}</div></td>
      <td class="text-right fw6">${esc(o.bagMiktar)}</td>
      <td>${fmtDate(o.sozTarih)}</td>
      <td><input type="date" id="date-${o.id}" value="${esc(r.yeniTarih||"")}" style="min-width:130px" onchange="onDateChange('${esc(o.id)}')" /></td>
      <td><input type="text" id="not-${o.id}" value="${esc(r.not||"")}" placeholder="Not..." style="min-width:100px" /></td>
      <td>
        <button class="btn btn-navy btn-sm" id="savebtn-${o.id}" onclick="saveRowSup('${esc(o.id)}')" ${!r.yeniTarih ? "disabled" : ""}>
          ${isSubmitted ? "✓ Güncelle" : "Kaydet"}
        </button>
      </td>
    </tr>`;
  }

  document.body.innerHTML = `
  <div class="page">
    <header>
      <div class="inner">
        <a href="?" style="text-decoration:none">${logoHTML(28)}</a>
        <span style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:600">${esc(tedAdi)}</span>
      </div>
    </header>
    <main>
      <div id="flash" class="hidden"></div>
      ${orders.length === 0 ? '<div class="card card-pad" style="text-align:center;color:var(--lgray);padding:60px">Size ait açık sipariş bulunamadı.</div>' : `
      <div class="section-hdr">
        <div>
          <div class="section-title">Açık Siparişler</div>
          <div class="text-xs c-gray mt4">Tarih girerek "Kaydet" butonuna basın. Toplu kayıt için satırları seçip "Seçilenleri Kaydet" butonunu kullanın.</div>
        </div>
        <div class="flex gap8">
          <button class="btn btn-ghost btn-sm" onclick="selectAllSup()">Tümünü Seç</button>
          <button class="btn btn-primary btn-sm" onclick="saveSelectedSup()">Seçilenleri Kaydet</button>
        </div>
      </div>
      ${acil.length > 0 ? `
      <div style="margin-bottom:16px">
        <div class="flex gap8 mb8"><span style="color:#dc2626;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px">⚠ Acil Kalemler</span></div>
        <div class="card overflow-x">
          <table class="tbl">
            <thead><tr><th style="width:30px"><input type="checkbox" onchange="toggleAllSup(this.checked,'acil')" /></th><th></th><th>Talep</th><th>Malz. Kodu</th><th>Malzeme Tanımı</th><th>Bağlanmamış</th><th>Mevcut Tarih</th><th>Yeni Tarih *</th><th>Not</th><th></th></tr></thead>
            <tbody>${acil.map((o,i) => orderRowHTML(o,i)).join("")}</tbody>
          </table>
        </div>
      </div>` : ""}
      ${normal.length > 0 ? `
      <div>
        ${acil.length > 0 ? '<div style="font-size:12px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Diğer Siparişler</div>' : ""}
        <div class="card overflow-x">
          <table class="tbl">
            <thead><tr><th style="width:30px"><input type="checkbox" onchange="toggleAllSup(this.checked,'normal')" /></th><th></th><th>Talep</th><th>Malz. Kodu</th><th>Malzeme Tanımı</th><th>Bağlanmamış</th><th>Mevcut Tarih</th><th>Yeni Tarih</th><th>Not</th><th></th></tr></thead>
            <tbody>${normal.map((o,i) => orderRowHTML(o,i)).join("")}</tbody>
          </table>
        </div>
      </div>` : ""}
      `}
    </main>
  </div>`;

  window._supOrders = orders;
  window._supResponses = responses;

  window.onDateChange = function(id) {
    const v = document.getElementById("date-"+id);
    const btn = document.getElementById("savebtn-"+id);
    if (btn) btn.disabled = !v || !v.value;
  };

  window.toggleAllSup = function(checked, group) {
    const list = group === "acil" ? acil : normal;
    list.forEach(o => { const el = document.getElementById("chk-sup-"+o.id); if (el) el.checked = checked; });
  };

  window.selectAllSup = function() {
    orders.forEach(o => { const el = document.getElementById("chk-sup-"+o.id); if (el) el.checked = true; });
  };

  window.saveRowSup = async function(id) {
    const dateEl = document.getElementById("date-"+id);
    const notEl = document.getElementById("not-"+id);
    if (!dateEl || !dateEl.value) return;
    const btn = document.getElementById("savebtn-"+id);
    if (btn) { btn.disabled = true; btn.textContent = "..."; }
    try {
      await saveResponse(id, dateEl.value, notEl ? notEl.value : "");
      if (btn) { btn.textContent = "✓ Kaydedildi"; btn.style.background = "#16a34a"; }
      const row = document.getElementById("row-"+id);
      if (row) { row.classList.remove("late"); row.classList.add("done"); }
      flash("Kaydedildi.");
    } catch(e) {
      flash("Hata: " + e.message, "err");
      if (btn) { btn.disabled = false; btn.textContent = "Kaydet"; }
    }
  };

  window.saveSelectedSup = async function() {
    const selected = orders.filter(o => { const el = document.getElementById("chk-sup-"+o.id); return el && el.checked; });
    if (!selected.length) { flash("Hiç satır seçilmedi.", "warn"); return; }
    let saved = 0;
    for (const o of selected) {
      const dateEl = document.getElementById("date-"+o.id);
      if (dateEl && dateEl.value) {
        const notEl = document.getElementById("not-"+o.id);
        await saveResponse(o.id, dateEl.value, notEl ? notEl.value : "");
        const btn = document.getElementById("savebtn-"+o.id);
        if (btn) { btn.textContent = "✓ Kaydedildi"; btn.style.background = "#16a34a"; }
        const row = document.getElementById("row-"+o.id);
        if (row) { row.classList.remove("late"); }
        saved++;
      }
    }
    flash(saved + " satır kaydedildi.");
  };
}
</script>

<!-- ═══════════════════════════════════
     DASHBOARD
═══════════════════════════════════ -->
<script>
let _dashTab = "ozet";
let _dashOrders = [];
let _dashResponses = {};
let _dashSuppliers = {};
let _dashUploadedAt = null;
let _dashPassword = "";
let _dashHaric = new Set();

async function showDashboard() {
  document.body.innerHTML = `
  <div class="page">
    <header>
      <div class="inner">
        <a href="?" style="text-decoration:none">${logoHTML(28)}</a>
        <div class="nav-links">
          <button class="nav-btn" onclick="navigate('view=admin')">⚙️ Admin</button>
          <button class="nav-btn orange" id="btn-excel" onclick="doExport()">⬇ Excel</button>
        </div>
      </div>
    </header>
    <div class="page-tabs" id="dash-tabs">
      <button class="page-tab active" onclick="switchDashTab('ozet',this)">📊 Özet</button>
      <button class="page-tab" onclick="switchDashTab('tablo',this)">📋 Ana Tablo</button>
      <button class="page-tab" onclick="switchDashTab('donusler',this)">✅ Tedarikçi Dönüşleri</button>
      <button class="page-tab" onclick="switchDashTab('gecikmis',this)">⚠️ Gecikmiş</button>
      <button class="page-tab" onclick="switchDashTab('acil',this)">🚨 Acil Talepler</button>
      <button class="page-tab" onclick="switchDashTab('hatirlatma',this)">🔔 Hatırlatma</button>
    </div>
    <main>
      <div id="flash" class="hidden"></div>
      <div id="dash-content"><div style="text-align:center;padding:60px;color:var(--lgray)">Yükleniyor...</div></div>
    </main>
  </div>`;

  await loadDashData();
  renderDashTab(_dashTab);
}

async function loadDashData() {
  const [orders, responses, suppliers, uploadedAt, password, haricRaw] = await Promise.all([
    getOrders(), getResponses(), getSuppliers(), getAyar("uploadedAt"), getAyar("password"), getAyar("haric_tutulanlar")
  ]);
  _dashOrders = orders;
  _dashResponses = responses;
  _dashSuppliers = suppliers;
  _dashUploadedAt = uploadedAt;
  _dashPassword = password || "";
  _dashHaric = new Set((haricRaw || "").split(",").map(s=>s.trim()).filter(Boolean));
}

window.doExport = function() { exportExcel(_dashOrders, _dashResponses); };

window.switchDashTab = function(tab, btn) {
  _dashTab = tab;
  document.querySelectorAll(".page-tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  renderDashTab(tab);
};

function supplierStats() {
  const map = new Map();
  _dashOrders.forEach(o => {
    if (!map.has(o.tedNo)) {
      const sup = _dashSuppliers[o.tedNo] || {};
      map.set(o.tedNo, { tedNo: o.tedNo, tedUnvan: o.tedUnvan, mail: sup.mail || "", orders: [] });
    }
    map.get(o.tedNo).orders.push(o);
  });
  const daysSinceUpload = daysDiff(_dashUploadedAt);
  return Array.from(map.values()).map(s => {
    const submitted = s.orders.filter(o => _dashResponses[o.id] && _dashResponses[o.id].savedAt).length;
    const total = s.orders.length;
    let status = "bekliyor";
    if (submitted === total && total > 0) status = "tamamlandi";
    else if (submitted > 0) status = "kismi";
    else if (daysSinceUpload !== null && daysSinceUpload >= 2) status = "gecikti";
    const hatirlatmaGereken = s.orders.filter(o => {
      const r = _dashResponses[o.id] || {};
      const tarih = r.yeniTarih || o.sozTarih;
      const until = daysUntil(tarih);
      return (!r.savedAt && daysSinceUpload >= 2) || (until !== null && until < 0 && !r.savedAt) || (until === 1 && !r.savedAt);
    });
    const isHaric = _dashHaric.has(s.tedNo);
    return Object.assign({}, s, { submitted, total, status, daysSinceUpload, hatirlatmaGereken, isHaric });
  }).filter(s => !s.isHaric);
}

function statusBadge(status) {
  const m = { bekliyor: ["b-orange","Bekliyor"], kismi: ["b-blue","Kısmi"], tamamlandi: ["b-green","Tamamlandı"], gecikti: ["b-red","Gecikti"] };
  const [cls, lbl] = m[status] || m.bekliyor;
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function buildMailContent(s, tip, seciliOrders) {
  const link = buildLink(s.tedNo);
  let subject, body;
  if (tip === "hatirlatma") {
    subject = "Acik Siparis Listesi - Teslim Tarihi Guncelleme - " + s.tedUnvan;
    body = "Merhaba,\n\nAsagidaki linkten acik siparis satirlariniz icin guncel teslim tarihlerini girmenizi rica ederiz.\n\nForm Linki: " + link + (_dashPassword ? "\nErisim Sifresi: " + _dashPassword : "") + "\n\nGuncellemelerinizi en kisa surede tamamlayiniz.\n\nSaygilarimizla,\nCimtas Hassas Isleme Satin Alma";
  } else {
    const liste = (seciliOrders||[]).map(o => "- [" + o.malzKodu + "] " + o.malzTanim + " (" + o.talepNo + "/" + o.strNo + ")").join("\n");
    subject = "ACIL: Siparis Hizlandirma Talebi - " + s.tedUnvan;
    body = "Merhaba,\n\nAsagidaki kalemlerin teslimatinin hizlandirilmasini acilen talep ediyoruz:\n\n" + liste + "\n\nEn kisa surede donus yapmanizi rica ederiz.\n\nSaygilarimizla,\nCimtas Hassas Isleme Satin Alma";
  }
  return { subject, body, emails: normalizeEmails(s.mail) };
}

window.openMailFor = function(tedNo, tip) {
  const suppliers = supplierStats();
  const s = suppliers.find(x => x.tedNo === tedNo);
  if (!s) return;
  const secili = s.orders.filter(o => {
    const el = document.getElementById("hiz-chk-"+o.id);
    return el && el.checked;
  });
  const { subject, body, emails } = buildMailContent(s, tip, secili);
  if (!emails.length) { flash("Bu tedarikçinin mail adresi tanımlı değil.", "warn"); return; }
  showMailModal({
    to: emails.join("; "),
    subject, body,
    onConfirm: () => openMailto("mailto:" + emails.join(";") + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body))
  });
};

window.topluMail = function(tip) {
  const suppliers = supplierStats();
  const hedefler = tip === "tumu" ? suppliers.filter(s => s.status !== "tamamlandi" && s.mail && !s.isHaric) :
                   tip === "gecikti" ? suppliers.filter(s => s.status === "gecikti" && s.mail && !s.isHaric) :
                   suppliers.filter(s => s.hatirlatmaGereken.length > 0 && s.mail && !s.isHaric);
  if (!hedefler.length) { flash("Uygun tedarikçi bulunamadı.", "warn"); return; }
  let idx = 0;
  function next() {
    if (idx >= hedefler.length) { flash(hedefler.length + " mail hazırlandı."); return; }
    const s = hedefler[idx++];
    const { subject, body, emails } = buildMailContent(s, "hatirlatma");
    openMailto("mailto:" + emails.join(";") + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body));
    setTimeout(next, 1500);
  }
  next();
};

function renderDashTab(tab) {
  const content = document.getElementById("dash-content");
  if (tab === "ozet") renderOzet(content);
  else if (tab === "tablo") renderTablo(content);
  else if (tab === "donusler") renderDonusler(content);
  else if (tab === "gecikmis") renderGecikmis(content);
  else if (tab === "acil") renderAcilDash(content);
  else if (tab === "hatirlatma") renderHatirlatma(content);
}

function renderOzet(el) {
  const suppliers = supplierStats();
  const totals = {
    toplam: suppliers.length,
    tamamlandi: suppliers.filter(s => s.status==="tamamlandi").length,
    kismi: suppliers.filter(s => s.status==="kismi").length,
    gecikti: suppliers.filter(s => s.status==="gecikti").length,
    bekliyor: suppliers.filter(s => s.status==="bekliyor").length,
    hatirlatma: suppliers.filter(s => s.hatirlatmaGereken.length > 0 && !s.isHaric).length
  };
  const totalOrders = _dashOrders.filter(o => !_dashHaric.has(o.tedNo)).length;
  const totalDone = _dashOrders.filter(o => !_dashHaric.has(o.tedNo) && _dashResponses[o.id] && _dashResponses[o.id].savedAt).length;

  el.innerHTML = `
  <div class="grid5 mb20" style="margin-bottom:20px">
    <div class="stat"><div class="stat-val c-navy">${totals.toplam}</div><div class="stat-lbl">Tedarikçi</div></div>
    <div class="stat"><div class="stat-val c-green">${totals.tamamlandi}</div><div class="stat-lbl">Tamamlandı</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--amber)">${totals.kismi}</div><div class="stat-lbl">Kısmi</div></div>
    <div class="stat"><div class="stat-val c-red">${totals.gecikti}</div><div class="stat-lbl">Gecikti</div></div>
    <div class="stat"><div class="stat-val c-orange">${totals.hatirlatma}</div><div class="stat-lbl">Hatırlatma</div></div>
  </div>
  <div class="grid2 mb20" style="margin-bottom:20px">
    <div class="stat">
      <div class="flex gap8 mb8">
        <div class="flex-1"><div class="stat-val c-navy">${totalDone} / ${totalOrders}</div><div class="stat-lbl">Yanıtlanan Satır</div></div>
      </div>
      <div class="prog" style="width:100%;height:8px"><div class="prog-bar" style="width:${totalOrders?Math.round(totalDone/totalOrders*100):0}%;background:var(--orange)"></div></div>
    </div>
    <div class="stat">
      <div class="stat-val c-navy">${_dashUploadedAt ? fmtDate(_dashUploadedAt) : "—"}</div>
      <div class="stat-lbl">Son Yükleme Tarihi</div>
    </div>
  </div>

  <div class="section-hdr">
    <span class="section-title">Tedarikçi Durumu</span>
    <div class="flex gap8">
      <button class="btn btn-ghost btn-sm" onclick="topluMail('hatirlatma')">🔔 Hatırlatma Gerektirenlere Toplu Mail</button>
      <button class="btn btn-ghost btn-sm" onclick="topluMail('tumu')">✉ Tümüne Mail</button>
    </div>
  </div>

  <div class="search-wrap mb12">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Tedarikçi ara..." oninput="filterOzet(this.value)" id="ozet-search" />
  </div>

  <div class="card" id="ozet-list">
    ${suppliers.map(s => {
      const pct = s.total > 0 ? Math.round(s.submitted/s.total*100) : 0;
      const barColor = s.status==="tamamlandi" ? "#16a34a" : s.status==="gecikti" ? "#dc2626" : s.status==="kismi" ? "#f59e0b" : "var(--orange)";
      return `
      <div class="ozet-row" data-search="${esc(s.tedUnvan.toLowerCase())} ${esc(s.tedNo)}" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div class="flex gap8 mb4 flex-wrap">
            <span class="fw6 text-sm truncate" style="max-width:280px">${esc(s.tedUnvan)}</span>
            ${statusBadge(s.status)}
            ${s.hatirlatmaGereken.length > 0 && s.status !== "tamamlandi" ? '<span class="badge b-orange">🔔 '+s.hatirlatmaGereken.length+'</span>' : ""}
          </div>
          <div class="flex gap8">
            <div class="prog"><div class="prog-bar" style="width:${pct}%;background:${barColor}"></div></div>
            <span class="text-xs c-lgray">${s.submitted}/${s.total}</span>
          </div>
        </div>
        <div class="flex gap8">
          ${s.isHaric ? '<span class="text-xs c-lgray" title="Hariç tutulanlar listesinde">—</span>' : s.mail ? `<button class="btn btn-ghost btn-sm" onclick="openMailFor('${esc(s.tedNo)}','hatirlatma')">✉ Mail</button>` : '<span class="text-xs c-lgray">Mail yok</span>'}
        </div>
      </div>`;
    }).join("")}
  </div>`;

  window.filterOzet = function(q) {
    q = q.toLowerCase();
    document.querySelectorAll(".ozet-row").forEach(row => {
      row.style.display = !q || row.dataset.search.includes(q) ? "" : "none";
    });
  };
}

function renderTablo(el) {
  const q = { val: "" };
  const visibleOrders = _dashOrders.filter(o => !_dashHaric.has(o.tedNo));
  el.innerHTML = `
  <div class="section-hdr">
    <span class="section-title">Ana Tablo</span>
    <button class="btn btn-primary btn-sm" onclick="doExport()">⬇ Excel'e Aktar</button>
  </div>
  <div class="search-wrap mb12">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Tedarikçi, malzeme kodu veya tanım ara..." oninput="filterTablo(this.value)" />
  </div>
  <div class="card overflow-x">
    <table class="tbl">
      <thead><tr>
        <th>Tedarikçi</th><th>Talep</th><th>Malz. Kodu</th><th>Malzeme Tanımı</th>
        <th>Bağlanmamış</th><th>Söz Verilen</th><th>Yeni Tarih</th><th>Not</th><th>Durum</th>
      </tr></thead>
      <tbody id="tablo-body">
        ${visibleOrders.map(o => {
          const r = _dashResponses[o.id] || {};
          const until = daysUntil(r.yeniTarih || o.sozTarih);
          const isLate = until !== null && until < 0 && !r.savedAt;
          const durum = r.savedAt ? '<span class="badge b-green">✓ Girildi</span>' : isLate ? '<span class="badge b-red">Gecikmiş</span>' : '<span class="badge b-orange">Bekliyor</span>';
          return `<tr class="${isLate?"late":""}" data-search="${esc((o.tedUnvan+" "+o.malzKodu+" "+o.malzTanim).toLowerCase())}">
            <td class="truncate" style="max-width:160px">${esc(o.tedUnvan)}</td>
            <td class="mono">${esc(o.talepTipi)} ${esc(o.talepNo)}/${esc(o.strNo)}</td>
            <td class="mono">${esc(o.malzKodu)}</td>
            <td class="truncate" style="max-width:200px">${esc(o.malzTanim)}</td>
            <td>${esc(o.bagMiktar)}</td>
            <td>${fmtDate(o.sozTarih)}</td>
            <td class="fw6">${r.yeniTarih ? fmtDate(r.yeniTarih) : "—"}</td>
            <td class="truncate" style="max-width:120px;color:var(--gray)">${esc(r.not||"—")}</td>
            <td>${durum}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;

  window.filterTablo = function(q) {
    q = q.toLowerCase();
    document.querySelectorAll("#tablo-body tr").forEach(row => {
      row.style.display = !q || (row.dataset.search && row.dataset.search.includes(q)) ? "" : "none";
    });
  };
}

function renderDonusler(el) {
  const suppliers = supplierStats();
  el.innerHTML = `
  <div class="section-hdr">
    <span class="section-title">Tedarikçi Dönüşleri</span>
  </div>
  <div class="card overflow-x">
    <table class="tbl">
      <thead><tr><th>Tedarikçi</th><th>Toplam</th><th>Yanıtlanan</th><th>Bekleyen</th><th>Durum</th><th>İlerleme</th></tr></thead>
      <tbody>
        ${suppliers.map(s => {
          const pct = s.total > 0 ? Math.round(s.submitted/s.total*100) : 0;
          return `<tr>
            <td class="fw6">${esc(s.tedUnvan)}</td>
            <td>${s.total}</td>
            <td class="c-green fw6">${s.submitted}</td>
            <td class="${s.total-s.submitted > 0 ? "c-red fw6" : ""}">${s.total-s.submitted}</td>
            <td>${statusBadge(s.status)}</td>
            <td><div style="display:flex;align-items:center;gap:8px"><div class="prog" style="width:100px"><div class="prog-bar" style="width:${pct}%;background:${s.status==="tamamlandi"?"#16a34a":"var(--orange)"}"></div></div><span class="text-xs c-lgray">%${pct}</span></div></td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;
}

function renderGecikmis(el) {
  const gecikmisList = _dashOrders.filter(o => {
    if (_dashHaric.has(o.tedNo)) return false;
    const r = _dashResponses[o.id] || {};
    const tarih = r.yeniTarih || o.sozTarih;
    const until = daysUntil(tarih);
    return until !== null && until < 0 && !r.savedAt;
  });

  el.innerHTML = `
  <div class="section-hdr">
    <span class="section-title">Gecikmiş Siparişler (${gecikmisList.length})</span>
    <button class="btn btn-ghost btn-sm" onclick="topluMail('gecikti')">✉ Gecikenlere Toplu Mail</button>
  </div>
  ${gecikmisList.length === 0 ? '<div class="card card-pad" style="text-align:center;color:var(--lgray)">Gecikmiş sipariş yok. 🎉</div>' : `
  <div class="card overflow-x">
    <table class="tbl">
      <thead><tr><th>Tedarikçi</th><th>Talep</th><th>Malz. Kodu</th><th>Malzeme Tanımı</th><th>Bağlanmamış</th><th>Söz Verilen Tarih</th><th>Gecikme</th><th>Mail</th></tr></thead>
      <tbody>
        ${gecikmisList.map(o => {
          const r = _dashResponses[o.id] || {};
          const tarih = r.yeniTarih || o.sozTarih;
          const gun = Math.abs(daysUntil(tarih)||0);
          const sup = _dashSuppliers[o.tedNo] || {};
          return `<tr class="late">
            <td class="fw6 truncate" style="max-width:140px">${esc(o.tedUnvan)}</td>
            <td class="mono">${esc(o.talepTipi)} ${esc(o.talepNo)}/${esc(o.strNo)}</td>
            <td class="mono">${esc(o.malzKodu)}</td>
            <td class="truncate" style="max-width:180px">${esc(o.malzTanim)}</td>
            <td>${esc(o.bagMiktar)}</td>
            <td>${fmtDate(o.sozTarih)}</td>
            <td><span class="badge b-red">${gun} gün geç</span></td>
            <td>${sup.mail ? `<button class="btn btn-ghost btn-sm" onclick="openMailFor('${esc(o.tedNo)}','hatirlatma')">✉</button>` : "—"}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`}`;
}

function renderAcilDash(el) {
  const acilList = _dashOrders.filter(o => o.acil && !_dashHaric.has(o.tedNo));
  el.innerHTML = `
  <div class="section-hdr">
    <span class="section-title">Acil Talepler (${acilList.length})</span>
  </div>
  ${acilList.length === 0 ? '<div class="card card-pad" style="text-align:center;color:var(--lgray)">Acil olarak işaretlenmiş sipariş yok.</div>' : `
  <div class="card overflow-x">
    <table class="tbl">
      <thead><tr>
        <th><input type="checkbox" onchange="toggleAllHiz(this.checked)" /></th>
        <th>Tedarikçi</th><th>Talep</th><th>Malz. Kodu</th><th>Malzeme Tanımı</th><th>Bağlanmamış</th><th>Söz Verilen</th><th>Yeni Tarih</th><th>Durum</th>
      </tr></thead>
      <tbody>
        ${acilList.map(o => {
          const r = _dashResponses[o.id] || {};
          const until = daysUntil(r.yeniTarih || o.sozTarih);
          const isLate = until !== null && until < 0 && !r.savedAt;
          const durum = r.savedAt ? '<span class="badge b-green">✓</span>' : isLate ? '<span class="badge b-red">Geç</span>' : '<span class="badge b-acil">Bekliyor</span>';
          return `<tr class="${isLate?"late":""}">
            <td><input type="checkbox" class="hiz-chk" id="hiz-chk-${o.id}" data-ted="${esc(o.tedNo)}" /></td>
            <td class="fw6 truncate" style="max-width:140px">${esc(o.tedUnvan)}</td>
            <td class="mono">${esc(o.talepTipi)} ${esc(o.talepNo)}/${esc(o.strNo)}</td>
            <td class="mono">${esc(o.malzKodu)}</td>
            <td class="truncate" style="max-width:180px">${esc(o.malzTanim)}</td>
            <td>${esc(o.bagMiktar)}</td>
            <td>${fmtDate(o.sozTarih)}</td>
            <td class="fw6">${r.yeniTarih ? fmtDate(r.yeniTarih) : "—"}</td>
            <td>${durum}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>
  <div class="flex gap8 mt12" style="flex-wrap:wrap">
    <button class="btn btn-primary btn-sm" onclick="hizlandirSecililer()">⚡ Seçilenleri Hızlandır</button>
  </div>`}`;

  window.toggleAllHiz = function(checked) {
    document.querySelectorAll(".hiz-chk").forEach(el => el.checked = checked);
  };

  window.hizlandirSecililer = function() {
    const secili = Array.from(document.querySelectorAll(".hiz-chk:checked"));
    if (!secili.length) { flash("Hiç satır seçilmedi.", "warn"); return; }
    const byTed = {};
    secili.forEach(chk => {
      const ted = chk.dataset.ted;
      if (!byTed[ted]) byTed[ted] = [];
      byTed[ted].push(chk.id.replace("hiz-chk-",""));
    });
    const teds = Object.keys(byTed);
    let idx = 0;
    function next() {
      if (idx >= teds.length) { flash(teds.length + " hızlandırma maili hazırlandı."); return; }
      const tedNo = teds[idx++];
      const sup = _dashSuppliers[tedNo] || {};
      const emails = normalizeEmails(sup.mail);
      if (!emails.length) { next(); return; }
      const orders = _dashOrders.filter(o => byTed[tedNo].includes(o.id));
      const { subject, body } = buildMailContent({ tedNo, tedUnvan: orders[0].tedUnvan, mail: sup.mail }, "hizlandir", orders);
      openMailto("mailto:" + emails.join(";") + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body));
      setTimeout(next, 1500);
    }
    next();
  };
}

function renderHatirlatma(el) {
  const suppliers = supplierStats();
  const hatirlatmaList = suppliers.filter(s => s.hatirlatmaGereken.length > 0 && s.status !== "tamamlandi" && !s.isHaric);

  el.innerHTML = `
  <div class="section-hdr">
    <span class="section-title">Hatırlatma Gerekenler (${hatirlatmaList.length} tedarikçi)</span>
    <button class="btn btn-primary btn-sm" onclick="topluMail('hatirlatma')">📨 Tümüne Toplu Hatırlatma</button>
  </div>
  ${hatirlatmaList.length === 0 ? '<div class="card card-pad" style="text-align:center;color:var(--lgray)">Hatırlatma gereken tedarikçi yok. ✓</div>' : `
  <div class="space-y">
    ${hatirlatmaList.map(s => `
    <div class="card">
      <div style="padding:12px 16px;background:#fffbeb;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <span class="fw7 text-sm">${esc(s.tedUnvan)}</span>
          <span class="text-xs c-lgray" style="margin-left:8px">${s.hatirlatmaGereken.length} kalem bekliyor</span>
        </div>
        ${s.mail ? `<button class="btn btn-primary btn-sm" onclick="openMailFor('${esc(s.tedNo)}','hatirlatma')">✉ Hatırlatma Gönder</button>` : '<span class="text-xs c-lgray">Mail adresi yok</span>'}
      </div>
      <div class="overflow-x">
        <table class="tbl">
          <thead><tr><th>Talep</th><th>Malz. Kodu</th><th>Malzeme</th><th>Söz Verilen</th><th>Gecikme/Durum</th></tr></thead>
          <tbody>
            ${s.hatirlatmaGereken.slice(0,5).map(o => {
              const r = _dashResponses[o.id] || {};
              const tarih = r.yeniTarih || o.sozTarih;
              const until = daysUntil(tarih);
              let durum = until !== null && until < 0 ? '<span class="badge b-red">'+Math.abs(until)+' gün geç</span>' : until === 1 ? '<span class="badge b-orange">Yarın teslim</span>' : '<span class="badge b-orange">'+s.daysSinceUpload+' gündür yanıt yok</span>';
              return `<tr>
                <td class="mono">${esc(o.talepTipi)} ${esc(o.talepNo)}/${esc(o.strNo)}</td>
                <td class="mono">${esc(o.malzKodu)}</td>
                <td class="truncate" style="max-width:180px">${esc(o.malzTanim)}</td>
                <td>${fmtDate(o.sozTarih)}</td>
                <td>${durum}</td>
              </tr>`;
            }).join("")}
            ${s.hatirlatmaGereken.length > 5 ? `<tr><td colspan="5" style="color:var(--lgray);font-size:11px">...${s.hatirlatmaGereken.length-5} kalem daha</td></tr>` : ""}
          </tbody>
        </table>
      </div>
    </div>`).join("")}
  </div>`}`;
}
</script>

     ADMIN

<script>
let _adminTab = "orders";

async function showAdmin() {
  document.body.innerHTML = `
  <div class="page">
    <header>
      <div class="inner">
        <a href="?" style="text-decoration:none">${logoHTML(28)}</a>
        <button class="nav-btn" onclick="navigate('view=dashboard')">📊 Pano</button>
      </div>
    </header>
    <div class="page-tabs">
      <button class="page-tab active" onclick="switchAdminTab('orders',this)">📥 Sipariş Yükle</button>
      <button class="page-tab" onclick="switchAdminTab('acil',this)">🚨 Acil Kalemler</button>
      <button class="page-tab" onclick="switchAdminTab('suppliers',this)">👥 Tedarikçiler</button>
      <button class="page-tab" onclick="switchAdminTab('settings',this)">⚙️ Ayarlar</button>
    </div>
    <main>
      <div id="flash" class="hidden"></div>
      <div id="admin-content"></div>
    </main>
  </div>`;

  window.switchAdminTab = function(tab, btn) {
    _adminTab = tab;
    document.querySelectorAll(".page-tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    renderAdminTab(tab);
  };

  renderAdminTab("orders");
}

async function renderAdminTab(tab) {
  const el = document.getElementById("admin-content");
  if (tab === "orders") await renderOrdersAdmin(el);
  else if (tab === "acil") await renderAcilAdmin(el);
  else if (tab === "suppliers") await renderSuppliersAdmin(el);
  else if (tab === "settings") await renderSettingsAdmin(el);
}

async function renderOrdersAdmin(el) {
  const orders = await getOrders();
  const groups = {};
  orders.forEach(o => { if (!groups[o.tedNo]) groups[o.tedNo]={tedUnvan:o.tedUnvan,count:0}; groups[o.tedNo].count++; });

  el.innerHTML = `
  <div class="section-hdr">
    <span class="section-title">Açık Sipariş Listesi Yükle</span>
  </div>
  <div class="alert alert-info mb16">
    <span>Her hafta yeni Excel yüklendiğinde eski siparişler ve tedarikçi yanıtları silinir, sıfırdan başlar.</span>
  </div>
  <div class="upload-zone mb16" onclick="document.getElementById('order-file').click()">
    <div style="font-size:32px;margin-bottom:8px">📂</div>
    <p class="fw6">Excel dosyası seç</p>
    <p class="text-xs c-lgray mt4">.xlsx veya .xls — A=Talep Tipi, B=Talep No, C=Str No, D=Malz.Kodu, E=Tanım, F=Orig.Qty, G=Bağlanmamış, J=Söz Verilen, L=Ted.No, M=Ted.Ünvan</p>
    <input type="file" id="order-file" accept=".xlsx,.xls" style="display:none" onchange="handleOrderFile(this)" />
  </div>
  <div id="order-preview" class="hidden"></div>
  ${Object.keys(groups).length > 0 ? `
  <div class="section-hdr mt24" style="margin-top:24px"><span class="section-title">Tedarikçi Linkleri</span></div>
  <div class="card">
    ${Object.entries(groups).map(([tedNo,g]) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px">
      <div>
        <span class="fw6 text-sm">${esc(g.tedUnvan)}</span>
        <span class="text-xs c-lgray" style="margin-left:8px">${g.count} satır</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(buildLink(tedNo))}');flash('Kopyalandı.')">📋 Linki Kopyala</button>
    </div>`).join("")}
  </div>` : ""}`;

  window.handleOrderFile = async function(input) {
    const file = input.files[0]; if (!file) return;
    const prev = document.getElementById("order-preview");
    prev.innerHTML = '<div class="alert alert-info">Okunuyor...</div>';
    prev.classList.remove("hidden");
    try {
      const wb = await readExcel(file);
      const result = parseOrderExcel(wb);
      if (!result.length) { prev.innerHTML = '<div class="alert alert-err">Veri okunamadı. Sütun sırası doğru mu?</div>'; return; }
      window._pendingOrders = result;
      prev.innerHTML = `
      <div class="card card-pad">
        <div class="section-hdr"><span class="fw7">Önizleme — ${result.length} satır</span></div>
        <div class="overflow-x rounded border mb16">
          <table class="tbl">
            <thead><tr><th>Tedarikçi</th><th>Talep</th><th>Malz. Kodu</th><th>Malzeme</th><th>Miktar</th><th>Söz Verilen Tarih</th></tr></thead>
            <tbody>
              ${result.slice(0,8).map(r => `<tr>
                <td>${esc(r.tedUnvan)}</td>
                <td class="mono">${esc(r.talepTipi)} ${esc(r.talepNo)}/${esc(r.strNo)}</td>
                <td class="mono">${esc(r.malzKodu)}</td>
                <td class="truncate" style="max-width:160px">${esc(r.malzTanim)}</td>
                <td>${esc(r.bagMiktar)}</td>
                <td>${fmtDate(r.sozTarih)}</td>
              </tr>`).join("")}
              ${result.length > 8 ? `<tr><td colspan="6" style="color:var(--lgray);font-size:11px">...${result.length-8} satır daha</td></tr>` : ""}
            </tbody>
          </table>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <p class="text-sm c-gray">⚠️ Mevcut veri ve tedarikçi yanıtları silinecek.</p>
          <button class="btn btn-primary" onclick="doSaveOrders()">💾 ${result.length} satırı kaydet</button>
        </div>
      </div>`;
    } catch(e) {
      prev.innerHTML = `<div class="alert alert-err">Hata: ${esc(e.message)}</div>`;
    }
  };

  window.doSaveOrders = async function() {
    const rows = window._pendingOrders;
    if (!rows || !rows.length) return;
    const btn = document.querySelector("[onclick='doSaveOrders()']");
    if (btn) { btn.disabled = true; btn.textContent = "Kaydediliyor..."; }
    try {
      await uploadOrders(rows);
      flash(rows.length + " satır kaydedildi.");
      window._pendingOrders = null;
      await renderOrdersAdmin(document.getElementById("admin-content"));
    } catch(e) {
      flash("Hata: " + e.message, "err");
      if (btn) { btn.disabled = false; btn.textContent = "Kaydet"; }
    }
  };
}

async function renderAcilAdmin(el) {
  const orders = await getOrders();
  if (!orders.length) { el.innerHTML = '<div class="card card-pad" style="text-align:center;color:var(--lgray)">Önce sipariş yükleyin.</div>'; return; }
  const groups = new Map();
  orders.forEach(o => { if (!groups.has(o.tedNo)) groups.set(o.tedNo,{tedUnvan:o.tedUnvan,orders:[]}); groups.get(o.tedNo).orders.push(o); });

  el.innerHTML = `
  <div class="section-hdr">
    <span class="section-title">Acil Kalemler</span>
  </div>
  <p class="text-sm c-gray mb16">İşaretlenen kalemler tedarikçi formunda kırmızı ACİL rozeti ile en üstte gösterilir.</p>
  <div class="search-wrap mb12">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Tedarikçi, malzeme kodu veya tanım ara..." oninput="filterAcilAdmin(this.value)" />
  </div>
  <div class="space-y" id="acil-admin-list">
    ${Array.from(groups.entries()).map(([tedNo,g]) => `
    <div class="card" id="acilgrp-${esc(tedNo)}">
      <div style="padding:10px 16px;background:#F5F6F8;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <span class="fw7 text-sm">${esc(g.tedUnvan)}</span>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--gray)">
          <input type="checkbox" onchange="toggleTedAcil('${esc(tedNo)}',this.checked)" ${g.orders.every(o=>o.acil)?"checked":""} />
          Tümü
        </label>
      </div>
      <div>
        ${g.orders.map(o => `
        <label class="acil-item" data-search="${esc((g.tedUnvan+" "+o.malzKodu+" "+o.malzTanim).toLowerCase())}"
          style="display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-bottom:1px solid var(--border)"
          onmouseenter="this.style.background='#fffaf8'" onmouseleave="this.style.background=''">
          <input type="checkbox" id="acil-${o.id}" ${o.acil?"checked":""} onchange="toggleAcilItem('${esc(o.id)}',this.checked)" />
          <div style="flex:1;min-width:0">
            <div class="flex gap8 mb4">
              <span class="mono" style="background:#f1f5f9;padding:1px 6px;border-radius:4px;font-size:11px">${esc(o.malzKodu)}</span>
              ${o.acil ? '<span class="badge b-acil" style="font-size:9px">ACİL</span>' : ""}
            </div>
            <p class="text-sm truncate">${esc(o.malzTanim)}</p>
            <p class="text-xs c-lgray mono">${esc(o.talepTipi)} ${esc(o.talepNo)}/${esc(o.strNo)} — ${esc(o.bagMiktar)}</p>
          </div>
        </label>`).join("")}
      </div>
    </div>`).join("")}
  </div>`;

  window.filterAcilAdmin = function(q) {
    q = q.toLowerCase();
    document.querySelectorAll(".acil-item").forEach(item => {
      item.style.display = !q || item.dataset.search.includes(q) ? "" : "none";
    });
    document.querySelectorAll("[id^='acilgrp-']").forEach(grp => {
      const vis = Array.from(grp.querySelectorAll(".acil-item")).some(i => i.style.display !== "none");
      grp.style.display = vis ? "" : "none";
    });
  };

  window.toggleAcilItem = async function(id, acil) {
    try { await setAcil(id, acil); flash("Kaydedildi."); }
    catch(e) { flash("Hata: "+e.message, "err"); }
  };

  window.toggleTedAcil = async function(tedNo, checked) {
    const order = orders.filter(o => o.tedNo === tedNo);
    for (const o of order) {
      const el = document.getElementById("acil-"+o.id);
      if (el) el.checked = checked;
      try { await setAcil(o.id, checked); } catch(e) {}
    }
    flash("Kaydedildi.");
  };
}

async function renderSuppliersAdmin(el) {
  const smap = await getSuppliers();
  const list = Object.values(smap).sort((a,b) => (a.name||"").localeCompare(b.name||"","tr"));

  el.innerHTML = `
  <div class="section-hdr">
    <span class="section-title">Tedarikçi Listesi</span>
    <div class="flex gap8">
      <div class="upload-zone" style="padding:8px 16px;cursor:pointer" onclick="document.getElementById('sup-file').click()">
        <span class="text-sm c-gray">📂 Excel ile toplu yükle</span>
        <input type="file" id="sup-file" accept=".xlsx,.xls" style="display:none" onchange="handleSupFile(this)" />
      </div>
      <button class="btn btn-primary btn-sm" onclick="showAddSupForm()">+ Yeni Ekle</button>
    </div>
  </div>
  <div id="add-sup-form" class="hidden card card-pad mb16">
    <div class="grid3 mb12">
      <div><label class="lbl">Tedarikçi No *</label><input type="text" id="new-ted-no" placeholder="12345" /></div>
      <div><label class="lbl">Ünvan</label><input type="text" id="new-ted-name" placeholder="Firma Adı" /></div>
      <div><label class="lbl">Mail</label><input type="text" id="new-ted-mail" placeholder="info@firma.com" /></div>
    </div>
    <div class="flex gap8">
      <button class="btn btn-primary btn-sm" onclick="addSupplierAdmin()">Kaydet</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('add-sup-form').classList.add('hidden')">İptal</button>
    </div>
  </div>
  <div class="search-wrap mb12">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Tedarikçi ara..." oninput="filterSupAdmin(this.value)" />
  </div>
  <div class="card" id="sup-admin-list">
    ${list.length === 0 ? '<div style="padding:32px;text-align:center;color:var(--lgray)">Tedarikçi listesi boş.</div>' :
      list.map(s => `
      <div class="sup-admin-row" data-search="${esc(s.tedNo+" "+s.name.toLowerCase())}"
        style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap" id="sup-row-${esc(s.tedNo)}">
        <div style="flex:1;min-width:0">
          <div class="flex gap8"><span class="mono text-xs c-lgray">${esc(s.tedNo)}</span><span class="fw6 text-sm truncate">${esc(s.name)}</span></div>
          <p class="text-xs mt4 truncate" style="color:${s.mail?"var(--gray)":"#dc2626"}">${esc(s.mail||"⚠ Mail adresi yok!")}</p>
        </div>
        <div class="flex gap8">
          <button class="btn btn-ghost btn-sm" onclick="editSupAdmin('${esc(s.tedNo)}','${esc(s.name)}','${esc(s.mail)}')">✏️ Düzenle</button>
          <button class="btn btn-red btn-sm" onclick="delSupAdmin('${esc(s.tedNo)}')">🗑</button>
        </div>
      </div>`).join("")}
  </div>`;

  window.showAddSupForm = function() { document.getElementById("add-sup-form").classList.remove("hidden"); };

  window.filterSupAdmin = function(q) {
    q = q.toLowerCase();
    document.querySelectorAll(".sup-admin-row").forEach(row => {
      row.style.display = !q || row.dataset.search.includes(q) ? "" : "none";
    });
  };

  window.addSupplierAdmin = async function() {
    const no = document.getElementById("new-ted-no").value.trim();
    if (!no) { flash("Tedarikçi No zorunlu.", "err"); return; }
    try {
      await upsertSupplier(no, document.getElementById("new-ted-name").value.trim(), document.getElementById("new-ted-mail").value.trim());
      flash("Tedarikçi eklendi.");
      await renderSuppliersAdmin(document.getElementById("admin-content"));
    } catch(e) { flash("Hata: "+e.message, "err"); }
  };

  window.editSupAdmin = function(no, name, mail) {
    const row = document.getElementById("sup-row-"+no);
    if (!row) return;
    row.innerHTML = `
    <div style="flex:1;display:grid;grid-template-columns:1fr 2fr 3fr;gap:8px;min-width:0">
      <input type="text" value="${esc(no)}" disabled />
      <input type="text" id="edit-name-${esc(no)}" value="${esc(name)}" />
      <input type="text" id="edit-mail-${esc(no)}" value="${esc(mail)}" />
    </div>
    <div class="flex gap8">
      <button class="btn btn-primary btn-sm" onclick="saveEditSup('${esc(no)}')">Kaydet</button>
      <button class="btn btn-ghost btn-sm" onclick="renderSuppliersAdmin(document.getElementById('admin-content'))">İptal</button>
    </div>`;
  };

  window.saveEditSup = async function(no) {
    try {
      await upsertSupplier(no, document.getElementById("edit-name-"+no).value.trim(), document.getElementById("edit-mail-"+no).value.trim());
      flash("Güncellendi.");
      await renderSuppliersAdmin(document.getElementById("admin-content"));
    } catch(e) { flash("Hata: "+e.message, "err"); }
  };

  window.delSupAdmin = async function(no) {
    if (!confirm("Bu tedarikçiyi silmek istediğinize emin misiniz?")) return;
    try {
      await deleteSupplier(no);
      flash("Silindi.");
      await renderSuppliersAdmin(document.getElementById("admin-content"));
    } catch(e) { flash("Hata: "+e.message, "err"); }
  };

  window.handleSupFile = async function(input) {
    const file = input.files[0]; if (!file) return;
    try {
      const wb = await readExcel(file);
      const parsed = parseSupplierExcel(wb);
      for (const s of Object.values(parsed)) { await upsertSupplier(s.tedNo, s.name, s.mail); }
      flash(Object.keys(parsed).length + " tedarikçi yüklendi.");
      input.value = "";
      await renderSuppliersAdmin(document.getElementById("admin-content"));
    } catch(e) { flash("Hata: "+e.message, "err"); }
  };
}

async function renderSettingsAdmin(el) {
  const pwd = await getAyar("password") || "";
  const hariçRaw = await getAyar("haric_tutulanlar") || "";
  const hariçList = hariçRaw ? hariçRaw.split(",").map(s=>s.trim()).filter(Boolean) : [];

  // Mevcut siparişlerdeki tüm tedarikçileri getir
  const orders = await getOrders();
  const tedMap = {};
  orders.forEach(o => { if (!tedMap[o.tedNo]) tedMap[o.tedNo] = o.tedUnvan; });
  const tedList = Object.entries(tedMap).sort((a,b) => a[1].localeCompare(b[1],"tr"));

  el.innerHTML = `
  <div class="section-hdr"><span class="section-title">Ayarlar</span></div>

  <div class="card card-pad mb16">
    <label class="lbl">Tedarikçi Erişim Şifresi</label>
    <p class="text-xs c-gray mb8">Tedarikçiler forma girmeden önce bu şifreyi sorar. Mail içinde otomatik paylaşılır.</p>
    <div class="flex gap8">
      <input type="text" id="pwd-val" value="${esc(pwd)}" placeholder="Örn: cimtas2026" style="max-width:300px" />
      <button class="btn btn-primary btn-sm" onclick="savePwd()">Kaydet</button>
    </div>
  </div>

  <div class="card card-pad">
    <label class="lbl">Mail Gönderilmeyecek / Hatırlatmaya Dahil Edilmeyecek Tedarikçiler</label>
    <p class="text-xs c-gray mb12">İşaretlenen tedarikçiler dashboard'da görünür ama mail butonu gösterilmez, toplu hatırlatmaya dahil edilmez. Her hafta seçimlerin korunur.</p>
    <div class="search-wrap mb12">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Tedarikçi ara..." oninput="filterHaricList(this.value)" />
    </div>
    <div style="max-height:400px;overflow-y:auto;border:1px solid var(--border);border-radius:8px" id="haric-list">
      ${tedList.length === 0 ? '<div style="padding:16px;text-align:center;color:var(--lgray)">Önce sipariş yükleyin.</div>' :
        tedList.map(([no, unvan]) => `
        <label class="haric-item" data-search="${esc((no+" "+unvan).toLowerCase())}"
          style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer"
          onmouseenter="this.style.background='#fffaf8'" onmouseleave="this.style.background=''">
          <input type="checkbox" id="haric-${esc(no)}" ${hariçList.includes(no) ? "checked" : ""} />
          <div>
            <span class="text-sm fw6">${esc(unvan)}</span>
            <span class="mono text-xs c-lgray" style="margin-left:8px">${esc(no)}</span>
          </div>
        </label>`).join("")}
    </div>
    <div class="flex gap8 mt12">
      <button class="btn btn-primary btn-sm" onclick="saveHaric()">💾 Kaydet</button>
      <span class="text-xs c-lgray" style="align-self:center">${hariçList.length} tedarikçi hariç tutulmuş</span>
    </div>
  </div>`;

  window.savePwd = async function() {
    const val = document.getElementById("pwd-val").value.trim();
    await setAyar("password", val);
    flash(val ? "Şifre kaydedildi." : "Şifre koruması kaldırıldı.");
  };

  window.filterHaricList = function(q) {
    q = q.toLowerCase();
    document.querySelectorAll(".haric-item").forEach(item => {
      item.style.display = !q || item.dataset.search.includes(q) ? "" : "none";
    });
  };

  window.saveHaric = async function() {
    const secili = Array.from(document.querySelectorAll("[id^='haric-']:checked"))
      .map(el => el.id.replace("haric-",""));
    await setAyar("haric_tutulanlar", secili.join(","));
    flash(secili.length + " tedarikçi hariç tutuldu.");
    await renderSettingsAdmin(document.getElementById("admin-content"));
  };
}
</script>

<script>
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
